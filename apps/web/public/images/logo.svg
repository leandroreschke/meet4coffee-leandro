<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 25 690 500" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Lobster&amp;display=swap');
            .main-text {
                font-family: 'Lobster', cursive, sans-serif;
                font-size: 110px;
                text-anchor: middle;
            }
        </style>

        <text id="meet-text" x="400" y="450" class="main-text">Meet4Coffee</text>

        <g id="star-fill">
            <path d="M 0,-25 Q 0,0 25,0 Q 0,0 0,25 Q 0,0 -25,0 Q 0,0 0,-25 Z" fill="#f0e7d5" stroke="#4b3935" stroke-width="8" stroke-linejoin="round" />
        </g>
        <g id="star-black">
            <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#4b3935" />
        </g>
    </defs>

    <use href="#star-black" transform="translate(150, 140)" />
    <use href="#star-fill" transform="translate(90, 210) scale(0.9)" />
    <use href="#star-fill" transform="translate(680, 130) scale(0.9)" />
    <use href="#star-black" transform="translate(730, 190) scale(0.8)" />
    <use href="#star-black" transform="translate(620, 80) scale(0.7)" />

    <g transform="translate(400, 290)">
        <path d="M -260,0 A 260 260 0 0 1 260,0 L 70,0 A 70 70 0 0 0 -70,0 Z" fill="#4b3935" />
        <path d="M -224,0 A 224 224 0 0 1 224,0" fill="none" stroke="#D8C7F0" stroke-width="40" />
        <path d="M -168,0 A 168 168 0 0 1 168,0" fill="none" stroke="#F7C6D9" stroke-width="40" />
        <path d="M -112,0 A 112 112 0 0 1 112,0" fill="none" stroke="#FFE58A" stroke-width="40" />
    </g>

    <g transform="translate(370, 310) rotate(20)">
        <path d="M -30,0 C -80,-15 -80,50 -30,35" fill="none" stroke="#4b3935" stroke-width="20" stroke-linecap="round" />
        <path d="M -45,-30 L 45,-30 L 35,45 C 35,70 -35,70 -40,45 Z" fill="#4b3935" stroke="#4b3935" stroke-width="20" stroke-linejoin="round" />
        <path d="M -30,0 C -80,-15 -80,50 -30,35" fill="none" stroke="#f0e7d5" stroke-width="10" stroke-linecap="round" />
        <path d="M -45,-30 L 45,-30 L 35,45 C 35,70 -35,70 -40,45 Z" fill="#f0e7d5" />
    </g>
    
    <g transform="translate(430, 310) rotate(-20)">
        <path d="M 30,0 C 80,-15 80,50 30,35" fill="none" stroke="#4b3935" stroke-width="20" stroke-linecap="round" />
        <path d="M -45,-30 L 45,-30 L 35,45 C 35,70 -35,70 -40,45 Z" fill="#4b3935" stroke="#4b3935" stroke-width="20" stroke-linejoin="round" />
        <path d="M 30,0 C 80,-15 80,50 30,35" fill="none" stroke="#f0e7d5" stroke-width="10" stroke-linecap="round" />
        <path d="M -45,-30 L 45,-30 L 35,45 C 35,70 -35,70 -40,45 Z" fill="#f0e7d5" />
    </g>

    <g stroke="#4b3935" stroke-width="10" stroke-linecap="round" transform="translate(400, 268)">
        <path d="M 0,-20 L 0,-32 M -15,-15 L -25,-25 M 15,-15 L 25,-25" />
    </g>

    <g transform="rotate(-4, 400, 450)">
        <use href="#meet-text" fill="#f0e7d5" stroke="#4b3935" stroke-width="10" stroke-linejoin="round" />
        <use href="#meet-text" fill="#f0e7d5" />
    </g>
</svg>
